<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨</title>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];

        OneSignalDeferred.push(async function (OneSignal) {
            await OneSignal.init({
                appId: "f66f725a-9c4b-4f45-8f5c-33118e634400",
                safari_web_id: "web.onesignal.auto.2f682342-7506-4d13-96c3-4fd5fa35ae95",

                notifyButton: {
                    enable: false
                },

                promptOptions: {
                    slidedown: {
                        prompts: [{
                            type: "push",
                            autoPrompt: false,
                            text: {
                                actionMessage: "Kaplumbayağı mutlu etmek ister misin? 🐢",
                                acceptButton: "Evet! ✨",
                                cancelButton: "Hayır"
                            }
                        }]
                    }
                }
            });
        });

        function izinIste() {
            window.OneSignalDeferred.push(async function (OneSignal) {
                await OneSignal.Slidedown.promptPush();
            });
        }
    </script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fdfdfd;
            font-family: Arial, sans-serif;
        }

        .surpriz-buton {
            padding: 18px 35px;
            font-size: 18px;
            color: white;
            background-color: #ff85a2;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform .2s;
        }

        .surpriz-buton:active {
            transform: scale(.95);
        }
    </style>
</head>

<body>
    <button class="surpriz-buton" onclick="izinIste()">
        Sürprizi Aktif Et 🌸
    </button>
</body>
</html>
