name: Sürpriz Bildirim Botu

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 5 * * *' 

jobs:
  bildirim_gonder:
    runs-on: ubuntu-latest
    
    # İŞTE ÇÖZÜM BURASI: Bota dosyayı güncellemesi için yazma izni veriyoruz.
    permissions:
      contents: write

    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Gerekli Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Bildirim Scriptini Çalıştır
      env:
        ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: python bildirim_gonder.py

    - name: Yeni Mesajı Siteye Kaydet
      run: |
        git config --global user.name "ChatGPT Kankan"
        git config --global user.email "bot@senamithat.site"
        git add mesaj.json
        git commit -m "Sena için yeni günaydın mesajı hazırlandı ✨" || echo "Değişiklik yok"
        git push
