name: Sürpriz Bildirim Botu

on:
  workflow_dispatch:
    inputs:
      mesaj_turu:
        description: 'Hangi yapay zeka mesajını göndermek istiyorsun?'
        required: true
        type: choice
        options:
          - otomatik
          - sabah
          - oglen
      ozel_mesaj:
        description: '(İsteğe bağlı) Kendi cümleni yazmak istersen buraya yaz:'
        required: false
        type: string
  schedule:
    - cron: '0 11 * * *' # Sadece öğlen/ikinci mesaj otomatik tetiklenecek (UTC 11:00 -> TSİ 14:00)

jobs:
  bildirim_gonder:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Gerekli Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Bildirim Scriptini Çalıştır
      env:
        ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        MESAJ_TURU: ${{ github.event.inputs.mesaj_turu }}
        OZEL_MESAJ: ${{ github.event.inputs.ozel_mesaj }}
      run: python bildirim_gonder.py

    - name: Yeni Mesajı Siteye Kaydet
      run: |
        git config --global user.name "ChatGPT Kankan"
        git config --global user.email "bot@senamithat.site"
        git add mesaj.json
        git commit -m "Sena için yeni sürpriz hazırlandı ✨" || echo "Değişiklik yok"
        git push
