<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Mesajın Var 💌</title>
    <script>
      function mesajCek() {
          fetch('/mesaj.json?t=' + new Date().getTime())
              .then(response => response.json())
              .then(data => {
                  document.getElementById('mesajBaslik').innerText = data.baslik;
                  document.getElementById('mesajIcerik').innerText = data.icerik;
              });
      }
      document.addEventListener("DOMContentLoaded", mesajCek);
    </script>
    <style>
        body, html { margin: 0; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(135deg, #fdfdfd 0%, #ffe6eb 100%); font-family: sans-serif; }
        .mesaj-karti { background: rgba(255, 255, 255, 0.8); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(255, 133, 162, 0.2); text-align: center; width: 85%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
        .btn-yenile { margin-top:20px; padding:10px 20px; background:#ff85a2; color:white; border:none; border-radius:20px; cursor:pointer; }
    </style>
</head>
<body>
    <div class="mesaj-karti">
        <h2 id="mesajBaslik">Yükleniyor...</h2>
        <p id="mesajIcerik">...</p>
        <button class="btn-yenile" onclick="window.location.reload(true)">Mesajı Güncelle 🔄</button>
    </div>
</body>
</html>
