<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sena & Mithat ✨</title>
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      // OneSignal Kurulumu
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "f66f725a-9c4b-4f45-8f5c-33118e634400",
          serviceWorkerParam: { scope: "/" },
          serviceWorkerPath: "/OneSignalSDKWorker.js",
          
          // GÜNCELLENEN HOŞ GELDİN MESAJI:
          welcomeNotification: {
            disable: false,
            title: "Kaplumbağa çok mutlu 🐢",
            message: "Beklemede kal... ✨"
          },
          
          notifyButton: { enable: false },
          promptOptions: {
            slidedown: {
              prompts: [{
                type: "push",
                autoPrompt: false,
                text: {
                  actionMessage: "Kaplumbayağı mutlu etmek ister misin? 🐢",
                  acceptButton: "Evet! ✨",
                  cancelButton: "Hayır"
                }
              }]
            }
          }
        });
      });

      function izinIste() {
          window.OneSignalDeferred.push(async function(OneSignal) {
              await OneSignal.Slidedown.promptPush();
          });
      }

      // Son Mesajı Çekme İşlemi (mesaj.json dosyasından okur)
      document.addEventListener("DOMContentLoaded", () => {
          fetch('/mesaj.json')
              .then(response => response.json())
              .then(data => {
                  document.getElementById('mesajBaslik').innerText = data.baslik;
                  document.getElementById('mesajIcerik').innerText = data.icerik;
              })
              .catch(error => {
                  // Eğer mesaj.json dosyası henüz yoksa veya okunamazsa ekranda bu yazar:
                  document.getElementById('mesajBaslik').innerText = "Kaplumbağa çok mutlu 🐢";
                  document.getElementById('mesajIcerik').innerText = "Beklemede kal... ✨";
              });
      });
    </script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
