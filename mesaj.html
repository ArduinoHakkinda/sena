<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Mesajın Var 💌</title>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
          // Her seferinde en güncel mesajı çeker
          fetch('/mesaj.json?t=' + Math.random())
              .then(response => response.json())
              .then(data => {
                  document.getElementById('mesajBaslik').innerText = data.baslik;
                  document.getElementById('mesajIcerik').innerText = data.icerik;
              })
              .catch(error => {
                  document.getElementById('mesajBaslik').innerText = "Günaydın! 🌸";
                  document.getElementById('mesajIcerik').innerText = "Senin için güzel şeyler hazırlanıyor... ✨";
              });
      });
    </script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(135deg, #fdfdfd 0%, #ffe6eb 100%); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .mesaj-karti { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); padding: 30px 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(255, 133, 162, 0.2); text-align: center; max-width: 400px; border: 1px solid rgba(255, 255, 255, 0.5); }
        .mesaj-karti h2 { color: #ff5e84; margin-top: 0; font-size: 24px; }
        .mesaj-karti p { color: #555; font-size: 18px; line-height: 1.5; margin-bottom: 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="mesaj-karti">
        <h2 id="mesajBaslik">Yükleniyor...</h2>
        <p id="mesajIcerik">...</p>
    </div>
</body>
</html>
