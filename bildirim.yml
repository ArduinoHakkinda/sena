name: Sena Bildirim Otomasyonu

on:
  schedule:
    # Her gün Türkiye saatiyle sabah 09:00'da çalışır (UTC saatiyle 06:00'a denk gelir).
    # Eğer saati değiştirmek istersen UTC saatine göre -3 saat hesaplayarak yazmalısın.
    - cron: '0 6 * * *'
  workflow_dispatch: # Actions sekmesinden manuel olarak "Run workflow" butonuyla tetiklemeye izin verir

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Bildirim Göndericiyi Çalıştır
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: python bildirim_gonder.py