<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Sena ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: pink;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .box {
      width: 150px;
      height: 150px;
      background: red;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-weight: bold;
      font-size: 20px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      z-index: 10;
    }

    .message {
      display: none;
      font-size: 28px;
      font-weight: bold;
      color: #d10000;
      text-align: center;
      z-index: 20;
    }

    .heart {
      position: absolute;
      width: var(--size);
      height: var(--size);
      background: red;
      transform: rotate(-45deg);
      left: var(--x);
      bottom: 0;
      animation: floatUp 6s linear forwards;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: var(--size);
      height: var(--size);
      background: red;
      border-radius: 50%;
    }

    .heart::before {
      top: -50%;
      left: 0;
    }

    .heart::after {
      left: 50%;
      top: 0;
    }

    .heart .label {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Arial Black', Arial, sans-serif;
      font-weight: 900;
      font-size: calc(var(--size) / 7.5);
      color: rgba(255, 255, 255, 0.95);
      white-space: nowrap;
      text-align: center;
      /* DÜZELTME: Yazı en üst katmana taşındı */
      z-index: 1;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(-45deg); opacity: 1; }
      100% { transform: translateY(-100vh) rotate(-45deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="box" id="box">🎁 Sürpriz 🎁</div>
  <div class="message" id="message">Mithat seni cooooook seviyor ❤️</div>

  <audio id="bg-music" src="senin-sarkin.mp3"></audio>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>
    const box = document.getElementById('box');
    const message = document.getElementById('message');
    const music = document.getElementById('bg-music');

    box.addEventListener('click', () => {
      box.style.display = 'none';
      message.style.display = 'block';

      // Konfeti
      confetti({
        particleCount: 200,
        spread: 100,
        origin: { y: 0.6 }
      });

      // Müzik çal
      music.play().catch(error => {
        console.log("Müzik dosyası bulunamadı veya çalınamıyor. 'senin-sarkin.mp3' dosyasının doğru yerde olduğundan emin olun.");
        console.error("Hata detayı:", error);
      });

      // Kalpler çıkar
      setInterval(() => {
        createHeart();
      }, 800);
    });

    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      const size = Math.random() * 40 + 40;
      heart.style.setProperty('--size', size + 'px');
      heart.style.setProperty('--x', Math.random() * 100 + 'vw');

      const label = document.createElement('div');
      label.className = 'label';
      label.innerText = 'Sena';
      heart.appendChild(label);

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }
  </script>
</body>
</html>
